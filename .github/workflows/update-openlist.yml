name: Update OpenList Binary
on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-binary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Force Update Binary
        run: |
          # 1. 彻底删除仓库中可能存在的旧文件（假设文件名为 openlist）
          # 如果你的二进制文件名不是 openlist，请修改此处
          rm -f openlist
          
          # 2. 下载最新的压缩包
          echo "Downloading latest release..."
          wget https://github.com/OpenListTeam/OpenList/releases/latest/download/openlist-linux-musl-amd64-lite.tar.gz
          
          # 3. 解压
          # -j 参数可以直接解压出文件而不保留压缩包内的文件夹结构（如果有的话）
          tar -xzf openlist-linux-musl-amd64-lite.tar.gz
          
          # 4. 确保文件名统一
          # 注意：根据 OpenList 的压缩包，解压出来的文件名通常就是 openlist
          # 如果解压出来叫别名，请用 mv 重命名为你的目标文件名
          # mv openlist-linux-musl-amd64-lite openlist 
          
          # 5. 清理压缩包
          rm openlist-linux-musl-amd64-lite.tar.gz
          
          # 6. 赋予执行权限
          chmod +x openlist || true

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add openlist
          
          # 即使二进制内容一模一样，我们也强制提交（使用 --allow-empty）
          # 如果你不想在没更新时产生多余提交，可以去掉 --allow-empty
          git commit --allow-empty -m "chore: force replace openlist binary with latest release"
          git push
